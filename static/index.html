<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0e" />
  <title>Wan Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1><span class="seal"></span>Wan Mobile</h1>
    <div class="header-right">
      <span id="balance" class="balance" title="RunPod credit balance">—</span>
      <button id="ram-clear" class="ghost small" title="Clear RAM on active pod" hidden>🎈 RAM</button>
      <button id="refresh" class="ghost" title="Refresh">&#x21bb;</button>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="pods" class="active">Pod</button>
    <button data-tab="generate">Generate</button>
    <button data-tab="outputs">Outputs</button>
  </nav>

  <!-- POD TAB -->
  <section id="tab-pods" class="tab active">
    <div id="pods-list" class="card-list">
      <div class="muted">Loading pods&hellip;</div>
    </div>

    <div class="card">
      <h2>Start a new pod</h2>

      <div id="region-banner" class="banner"></div>

      <div class="filters">
        <div class="filter-block">
          <span class="filter-label">CUDA versions <span class="muted">· tap to filter (image needs ≥12.8)</span></span>
          <div id="cuda-chips" class="chips"></div>
        </div>
        <label>RAM / GPU
          <select id="ram-select"><option value="">Any</option></select>
        </label>
      </div>

      <div class="gpu-grid-head">
        <span class="filter-label">Select a GPU</span>
        <button id="refresh-gpus" class="ghost small" title="Refresh">&#x21bb;</button>
      </div>
      <div id="gpu-grid" class="gpu-grid">
        <div class="muted">Loading GPUs&hellip;</div>
      </div>
    </div>
  </section>

  <div class="deploy-bar" id="deploy-bar">
    <p class="hint">Container disk fixed at <span id="disk-hint">3</span>GB — models live on the network volume.</p>
    <button id="start-pod" class="primary" disabled>Deploy selected GPU</button>
  </div>

  <!-- GENERATE TAB -->
  <section id="tab-generate" class="tab">
    <div class="card">
      <label>Pod
        <select id="gen-pod"><option value="">No running pod</option></select>
      </label>
      <div id="pod-readiness" class="status"></div>
    </div>

    <div class="card">
      <h2>Input image</h2>
      <label class="filebtn">
        <input type="file" id="image" accept="image/*" />
        <span id="image-label">Photo library, camera, or files</span>
      </label>
      <img id="preview" alt="" hidden />
    </div>

    <div class="card">
      <h2>Prompt</h2>
      <select id="tpl-select" class="tpl-select"><option value="">— select a template —</option></select>
      <div class="tpl-actions">
        <button class="ghost small" id="tpl-use">Use</button>
        <button class="ghost small" id="tpl-update">Update</button>
        <button class="ghost small" id="tpl-save">Save as new</button>
        <button class="ghost small" id="tpl-del">Delete</button>
      </div>
      <div id="prompt-field"></div>
    </div>

    <div class="card">
      <h2>Parameters</h2>
      <select id="preset-select" class="tpl-select"><option value="">— saved presets —</option></select>
      <div class="tpl-actions">
        <button class="ghost small" id="preset-apply">Apply</button>
        <button class="ghost small" id="preset-save">Save current</button>
        <button class="ghost small" id="preset-del">Delete</button>
      </div>
      <div id="params"></div>
    </div>
  </section>

  <div class="generate-bar" id="generate-bar" style="display:none">
    <button id="generate" class="primary" disabled>Generate</button>
  </div>

  <!-- OUTPUTS TAB -->
  <section id="tab-outputs" class="tab">
    <div class="card">
      <div class="gpu-grid-head" style="margin-top:0">
        <label style="margin:0;flex:1">Pod
          <select id="out-pod"><option value="">No running pod</option></select>
        </label>
        <button id="out-select" class="ghost small" title="Select">Select</button>
        <button id="out-refresh" class="ghost small" title="Refresh">&#x21bb;</button>
      </div>
      <p class="hint">Videos generated on this pod. Tap to play; safe to close and come back.</p>
    </div>
    <div id="saved-section" hidden>
      <button class="section-head" id="saved-toggle">⭐ Saved <span class="section-chevron">▾</span></button>
      <div id="saved-list" class="out-grid"></div>
    </div>
    <div id="out-active" class="card-list"></div>
    <div id="session-section">
      <button class="section-head" id="session-toggle">📹 Current Session <span class="section-chevron">▾</span></button>
      <div id="out-list" class="out-grid"></div>
    </div>
  </section>

  <div id="bulk-bar" class="bulk-bar" hidden>
    <span id="bulk-count" class="muted small"></span>
    <div style="flex:1"></div>
    <button id="bulk-star" class="ghost small" disabled>★ Save</button>
    <button id="bulk-delete" class="ghost small" disabled>🗑 Delete</button>
    <button id="bulk-cancel" class="ghost small">Cancel</button>
  </div>

  <script src="/app.js"></script>
</body>
</html>
